<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EnglishSaathi — AI English Tutor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #header {
      width: 100%; max-width: 700px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 4px 15px rgba(247,151,30,0.4);
    }
    .logo-title { color: #fff; font-weight: 700; font-size: 17px; }
    .logo-sub { color: #ffd200; font-size: 11px; font-weight: 500; }
    .stats { display: flex; gap: 10px; }
    .stat-box {
      background: rgba(255,210,0,0.1);
      border: 1px solid rgba(255,210,0,0.3);
      border-radius: 20px; padding: 4px 12px; text-align: center;
    }
    .stat-num { color: #ffd200; font-size: 14px; font-weight: 700; }
    .stat-label { color: #aaa; font-size: 10px; }
    #chat {
      width: 100%; max-width: 700px; flex: 1;
      padding: 16px; display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto; min-height: calc(100vh - 260px);
    }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bubble {
      max-width: 78%;
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px; color: #fff;
      font-size: 14.5px; line-height: 1.7;
    }
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .bubble.user {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    }
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ffd200;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    #topics {
      width: 100%; max-width: 700px;
      padding: 10px 16px 6px;
      display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    }
    #topics::-webkit-scrollbar { display: none; }
    .topic-btn {
      white-space: nowrap;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 6px 14px;
      color: #ddd; font-size: 12.5px; cursor: pointer; transition: all 0.2s;
      flex-shrink: 0;
    }
    .topic-btn:hover {
      background: rgba(255,210,0,0.2);
      border-color: rgba(255,210,0,0.5); color: #ffd200;
    }
    #input-area {
      width: 100%; max-width: 700px;
      padding: 10px 16px 20px;
      display: flex; gap: 10px; align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px; padding: 12px 16px;
      color: #fff; font-size: 14.5px; resize: none;
      outline: none; line-height: 1.5; font-family: inherit;
      transition: border 0.2s;
    }
    #user-input:focus { border-color: rgba(255,210,0,0.6); }
    #user-input::placeholder { color: rgba(255,255,255,0.35); }
    #send-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 4px 20px rgba(247,151,30,0.5);
      transition: all 0.2s;
    }
    #send-btn:disabled {
      background: rgba(255,255,255,0.1); box-shadow: none; cursor: not-allowed;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo-area">
    <div class="logo-icon">🎓</div>
    <div>
      <div class="logo-title">EnglishSaathi</div>
      <div class="logo-sub">AI English Tutor • Hindi & Regional Languages</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="streak-count">🔥 1</div>
      <div class="stat-label">Day streak</div>
    </div>
    <div class="stat-box" style="background:rgba(100,200,100,0.1);border-color:rgba(100,200,100,0.3)">
      <div class="stat-num" id="words-count" style="color:#7fff7f">📚 0</div>
      <div class="stat-label">Words learned</div>
    </div>
  </div>
</div>

<div id="chat"></div>

<div id="topics">
  <button class="topic-btn" onclick="quickSend('Mujhe aaj ke liye 5 important English words sikhao Hindi meaning ke saath aur example sentences ke saath')">📝 Basic Words</button>
  <button class="topic-btn" onclick="quickSend('Office aur daily life mein use hone wale important English phrases sikhao')">💬 Spoken English</button>
  <button class="topic-btn" onclick="quickSend('Professional email kaise likhte hain English mein? Step by step sikhao example ke saath')">📧 Email Likhna</button>
  <button class="topic-btn" onclick="quickSend('Job interview ki taiyari karwao — common questions aur unke best answers sikhao')">🎯 Interview Prep</button>
  <button class="topic-btn" onclick="quickSend('Tenses Hindi mein samjhao — Present Past Future — examples ke saath bilkul simple tarike se')">⏰ Tenses</button>
  <button class="topic-btn" onclick="quickSend('Mujhse English mein conversation practice karwao — ek simple topic lo aur baat karo')">🗣️ Baat Karo</button>
  <button class="topic-btn" onclick="quickSend('Mera English level check karo — mujhse kuch questions poochho aur batao main beginner hoon ya intermediate')">📊 Level Check</button>
</div>

<div id="input-area">
  <textarea id="user-input" rows="2"
    placeholder="Hindi mein poochho... जैसे 'interview के लिए English सिखाओ'"
    onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const _k = atob('Z3NrX3lRWEZjZFowYThoWlJ2ZlNpWUZzV0dkeWIzRllwR25va2VyN2FpcXdvSW9vR2R3NkdzdGg=');

const SYSTEM_PROMPT = `You are "EnglishSaathi" — a warm, friendly, highly effective AI English tutor for Indian users who speak Hindi and regional languages.

PERSONALITY:
- You are like a knowledgeable elder brother/sister (bhaiya/didi) who studied in English medium
- Always encouraging, patient, never make the user feel bad about mistakes
- Use humor and relatable Indian references (chai, cricket, Bollywood, festivals)
- Address user as "aap" or "tum" based on their tone

LANGUAGE STYLE:
- ALWAYS mix Hindi/Hinglish with English naturally
- Understand any Indian language: Hindi, Marathi, Bengali, Tamil, Telugu, Gujarati, Kannada, Malayalam, Punjabi, Odia
- When teaching English, write the word in English + pronunciation in brackets + Hindi meaning
- Example: "Negotiate (ni-GO-shi-ate) = samjhauta karna"

TEACHING METHOD:
1. LEVEL ASSESSMENT: If new user, first assess their level with 2-3 simple questions
2. STRUCTURED LEARNING: Each session has a clear topic
3. EXAMPLES: Always give 3 examples — easy, medium, hard
4. PRACTICE: After teaching, give a small exercise
5. CORRECTION: If user makes mistake, gently correct: "Bahut achha try! Lekin isko aise bolenge: [correct version]"
6. MEMORY: Remember what was taught in this conversation and refer back to it

TOPICS YOU COVER:
- Daily vocabulary with pronunciation
- Grammar (tenses, articles, prepositions) in simple Hindi
- Spoken English for: office, interviews, travel, shopping, phone calls, emails
- Pronunciation tips (common Indian mistakes)
- Formal vs informal English
- Idioms and phrases with Indian context
- Reading and writing skills
- Conversation practice with roleplay

SPECIAL FEATURES:
- Do roleplay: "Chalo practice karte hain — main interviewer hoon, tum candidate"
- Give daily word with usage
- Track progress in conversation: "Is session mein tumne 5 new words sikhe!"
- Motivate: End every response with encouragement in Hinglish

FORMAT:
- Use emojis naturally
- Bold important English words
- Give clear sections when teaching
- Keep responses conversational, not too long
- Always end with either a question, exercise, or "Ab tum try karo!"`;

let messages = [];
let wordsLearned = 0;

window.onload = () => {
  addBotMessage(`Namaste! 🙏 Main hoon **EnglishSaathi** — aapka personal AI English tutor!\n\n😊 Aap mujhse **Hindi, Hinglish, ya koi bhi Indian language** mein baat kar sakte hain — main samjhunga!\n\nMain aapko sikhaunga:\n• 📚 Daily use English words & pronunciation\n• 💬 Spoken English — office, interview, travel\n• ✍️ Grammar — bilkul simple Hindi mein\n• 🎭 Roleplay practice — real situations mein\n• 📧 Email & formal writing\n\n**Pehle batao — aapka English level kaisa hai?**\n\n1️⃣ Bilkul beginner — basic bhi nahi aata\n2️⃣ Thoda aata hai — simple sentences samajh leta hoon\n3️⃣ Medium — baat kar leta hoon par mistakes hoti hain\n\nJawab do toh hum aapke liye personalized plan banayein! 🚀`);
};

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br/>');
}

function addBotMessage(text) {
  messages.push({ role: 'assistant', content: text });
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="avatar">🎓</div><div class="bubble bot">${formatText(text)}</div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMessage(text) {
  messages.push({ role: 'user', content: text });
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user">${formatText(text)}</div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row'; row.id = 'typing-indicator';
  row.innerHTML = `<div class="avatar">🎓</div><div class="bubble bot"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage(text) {
  const input = document.getElementById('user-input');
  const userText = text || input.value.trim();
  if (!userText) return;

  input.value = '';
  addUserMessage(userText);
  showTyping();
  document.getElementById('send-btn').disabled = true;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${_k}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1024,
        temperature: 0.8,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages.slice(0, -1)
        ]
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addBotMessage('⚠️ Error aa gaya: ' + data.error.message + '\n\nThodi der baad try karo!');
      return;
    }

    const reply = data.choices?.[0]?.message?.content || 'Kuch error aa gaya!';
    addBotMessage(reply);
    wordsLearned++;
    document.getElementById('words-count').textContent = '📚 ' + wordsLearned;

  } catch (err) {
    removeTyping();
    addBotMessage('⚠️ Internet connection check karo aur dobara try karo!');
  } finally {
    document.getElementById('send-btn').disabled = false;
  }
}

function quickSend(text) { sendMessage(text); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
</script>
</body>
</html>
